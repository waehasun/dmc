<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาข้อมูลนักเรียน DMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-title">🏫 ระบบข้อมูลนักเรียน (DMC)</div>
        <button class="btn-manage" onclick="goToManagePage()">⚙️ จัดการข้อมูล</button>
    </nav>

    <div class="search-container">
        <h2>🔍 ค้นหาข้อมูลนักเรียน</h2>
        <div class="search-box">
            <select id="searchType">
                <option value="เลขประจำตัวประชาชน">เลขประจำตัวประชาชน</option>
                <option value="รหัสประจำตัวนักเรียน">เลขประจำตัวนักเรียน</option>
                <option value="ชื่อ">ชื่อ</option>
                <option value="นามสกุล">นามสกุล</option>
            </select>
            
            <input type="text" id="searchInput" placeholder="พิมพ์ข้อมูลที่ต้องการค้นหา...">
            
            <button class="btn-search" onclick="searchData()">ค้นหา</button>
        </div>
    </div>

    <div class="results-area" id="resultsArea">
        <p id="loadingText" style="text-align: center; color: #7f8c8d;">กำลังค้นหาข้อมูล...</p>
        <div id="displayData"></div>
    </div>

    <script>
        // ================= สคริปต์การทำงาน (JavaScript) =================

        // 1. ฟังก์ชันเมื่อกดปุ่มค้นหา
        function searchData() {
            const searchType = document.getElementById("searchType").value;
            const searchInput = document.getElementById("searchInput").value;
            const resultsArea = document.getElementById("resultsArea");

            if (searchInput.trim() === "") {
                alert("กรุณากรอกข้อมูลที่ต้องการค้นหา");
                return;
            }

            // แสดงกล่องผลลัพธ์
            resultsArea.style.display = "block";
            document.getElementById("loadingText").innerHTML = `กำลังค้นหา "${searchInput}" จาก ${searchType}... ⏳`;
            
            // 📍 ตรงนี้เดี๋ยวเราจะมาเขียนโค้ด fetch() ไปยัง Google Apps Script (doGet) เพื่อดึงข้อมูลมาแสดงครับ
        }

        // 2. ฟังก์ชันไปหน้าจัดการข้อมูล (เตรียมรอไว้)
        function goToManagePage() {
            alert("เดี๋ยวจะพาไปหน้าจัดการข้อมูล (รอกำหนดรายละเอียดครับ)");
        }
    </script>

</body>
</html>
