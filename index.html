<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มบันทึกข้อมูล DMC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-container">
        <h2>📝 กรอกข้อมูล DMC</h2>
        <p class="subtitle">กรุณากรอกข้อมูลของคุณให้ครบถ้วน</p>
        
        <form id="myForm">
            <div class="input-group">
                <label for="ชื่อ">ชื่อ</label>
                <input type="text" id="ชื่อ" name="ชื่อ" placeholder="ระบุชื่อจริง" required>
            </div>
            
            <div class="input-group">
                <label for="นามสกุล">นามสกุล</label>
                <input type="text" id="นามสกุล" name="นามสกุล" placeholder="ระบุนามสกุล" required>
            </div>
            
            <div class="input-group">
                <label for="เบอร์โทรศัพท์">เบอร์โทรศัพท์</label>
                <input type="tel" id="เบอร์โทรศัพท์" name="เบอร์โทรศัพท์" placeholder="08X-XXX-XXXX" pattern="[0-9]{9,10}">
            </div>
            
            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
        </form>

        <p id="message"></p>
    </div>

    <script>
        // 🚨 อย่าลืมใส่ URL ของคุณตรงนี้นะครับ 🚨
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec'; 
        
        const form = document.getElementById('myForm');
        const btn = document.getElementById('submitBtn');
        const message = document.getElementById('message');

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            btn.disabled = true;
            btn.innerHTML = 'กำลังบันทึกข้อมูล... ⏳';
            message.innerHTML = "";

            const data = new URLSearchParams(new FormData(form));

            fetch(scriptURL, { method: 'POST', body: data, mode: 'no-cors'})
                .then(response => {
                    message.innerHTML = "✅ บันทึกข้อมูลสำเร็จแล้ว!";
                    message.className = "success-text";
                    form.reset(); 
                    btn.disabled = false;
                    btn.innerHTML = 'บันทึกข้อมูลใหม่';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    message.innerHTML = "❌ เกิดข้อผิดพลาดในการบันทึก";
                    message.className = "error-text";
                    btn.disabled = false;
                    btn.innerHTML = 'ลองใหม่อีกครั้ง';
                });
        });
    </script>
</body>
</html>
