<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMC SNR - Dashboard & Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-collapsed { width: 80px; }
        .sidebar-expanded { width: 260px; }
        .menu-text { transition: opacity 0.2s; }
        .collapsed .menu-text { opacity: 0; display: none; }
        .active-menu { background-color: #f0f9ff; color: #0284c7; border-radius: 0.75rem; }
        
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0284c7;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .card-stat { transition: transform 0.2s; }
        .card-stat:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="h-16 flex items-center px-6 border-b border-slate-100 shrink-0">
            <i class="fa-solid fa-graduation-cap text-2xl text-sky-600 mr-4"></i>
            <span class="menu-text font-bold text-xl text-slate-800 whitespace-nowrap">DMC SNR</span>
        </div>

        <nav class="flex-1 py-6 px-3 space-y-2">
            <a href="index.html" class="flex items-center px-4 py-3 active-menu font-medium transition-all group">
                <i class="fa-solid fa-chart-line w-6 text-lg"></i>
                <span class="menu-text ml-3">Dashboard</span>
            </a>
            <a href="admin.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-sky-600 rounded-xl transition-all group">
                <i class="fa-solid fa-lock w-6 text-lg"></i>
                <span class="menu-text ml-3">ส่วนแอดมิน</span>
            </a>
        </nav>

        <div class="p-3 border-t border-slate-100">
            <button onclick="toggleSidebar()" class="w-full flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                <i id="toggle-icon" class="fa-solid fa-angles-left w-6 text-lg"></i>
                <span class="menu-text ml-3">ซ่อนเมนู</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="h-16 flex items-center px-6 bg-white border-b border-slate-200 md:hidden">
            <button onclick="toggleSidebar()" class="text-slate-500 text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="ml-4 font-bold text-slate-800">DMC Dashboard</span>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-6xl mx-auto space-y-8">
                
                <!-- Dashboard Section -->
                <div id="dashboard-summary">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">ภาพรวมข้อมูลนักเรียน</h2>
                        <button onclick="fetchDashboardData()" class="text-sky-600 hover:text-sky-700 text-sm font-bold">
                            <i class="fa-solid fa-rotate mr-1"></i> อัปเดตข้อมูล
                        </button>
                    </div>

                    <!-- Stat Cards -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="card-stat bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="text-slate-400 text-xs font-bold uppercase mb-2">นักเรียนทั้งหมด</div>
                            <div class="text-3xl font-bold text-slate-800" id="stat-total">-</div>
                            <div class="text-emerald-500 text-xs mt-2"><i class="fa-solid fa-user-group mr-1"></i> คน</div>
                        </div>
                        <div class="card-stat bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="text-slate-400 text-xs font-bold uppercase mb-2">ชาย / หญิง</div>
                            <div class="text-2xl font-bold text-slate-800" id="stat-gender">- / -</div>
                            <div class="text-sky-500 text-xs mt-2"><i class="fa-solid fa-venus-mars mr-1"></i> อัตราส่วนเพศ</div>
                        </div>
                        <div class="card-stat bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="text-slate-400 text-xs font-bold uppercase mb-2">นร. ยากจน</div>
                            <div class="text-3xl font-bold text-rose-500" id="stat-disadvantaged">-</div>
                            <div class="text-rose-400 text-xs mt-2"><i class="fa-solid fa-hand-holding-heart mr-1"></i> ต้องการความช่วยเหลือ</div>
                        </div>
                        <div class="card-stat bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="text-slate-400 text-xs font-bold uppercase mb-2">เฉลี่ยส่วนสูง</div>
                            <div class="text-3xl font-bold text-slate-800" id="stat-height">-</div>
                            <div class="text-amber-500 text-xs mt-2"><i class="fa-solid fa-ruler mr-1"></i> เซนติเมตร</div>
                        </div>
                    </div>

                    <!-- Charts Grid -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <h3 class="font-bold text-slate-700 mb-6 text-center">สถิติจำนวนนักเรียนแยกตามชั้นเรียน</h3>
                            <div class="h-64"><canvas id="levelChart"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <h3 class="font-bold text-slate-700 mb-6 text-center">สัดส่วนผู้นับถือศาสนา</h3>
                            <div class="h-64 flex justify-center"><canvas id="religionChart"></canvas></div>
                        </div>
                    </div>
                </div>

                <hr class="border-slate-200">

                <!-- Search Section -->
                <div class="space-y-6">
                    <div class="text-center">
                        <h2 class="text-2xl font-bold text-slate-800">ค้นหารายบุคคล</h2>
                    </div>

                    <div class="relative group max-w-2xl mx-auto">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                        <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') searchData()" 
                               placeholder="ค้นหาชื่อ, นามสกุล หรือเลขบัตร..." 
                               class="w-full bg-white border border-slate-200 rounded-3xl pl-12 pr-32 py-5 outline-none focus:ring-4 ring-sky-500/10 focus:border-sky-500 transition-all shadow-sm">
                        <button onclick="searchData()" class="absolute right-3 top-3 bottom-3 bg-sky-600 text-white px-6 rounded-2xl font-bold hover:bg-sky-700 transition-all">ค้นหา</button>
                    </div>

                    <div id="resultsArea" class="hidden">
                        <div id="loading" class="hidden flex flex-col items-center py-10">
                            <div class="spinner mb-4"></div>
                            <p class="text-slate-400">กำลังค้นหา...</p>
                        </div>
                        <div id="displayData" class="grid grid-cols-1 gap-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec';
        let levelChartInstance, religionChartInstance;

        window.onload = () => {
            fetchDashboardData();
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-expanded');
            sidebar.classList.toggle('sidebar-collapsed');
            sidebar.classList.toggle('collapsed');
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch(`${scriptURL}?action=getAll&t=${new Date().getTime()}`);
                const res = await response.json();
                if (res.data) {
                    processDashboard(res.data);
                }
            } catch (error) {
                console.error("Dashboard error:", error);
            }
        }

        function processDashboard(data) {
            const total = data.length;
            const male = data.filter(d => d['เพศ'] === 'ช' || d['คำนำหน้าชื่อ']?.includes('เด็กชาย') || d['คำนำหน้าชื่อ']?.includes('นาย')).length;
            const female = total - male;
            const disadvantaged = data.filter(d => d['ความด้อยโอกาส'] && d['ความด้อยโอกาส'] !== '-' && d['ความด้อยโอกาส'] !== '').length;
            
            let sumHeight = 0, countHeight = 0;
            const levels = {};
            const religions = {};

            data.forEach(st => {
                // Height
                if(st['ส่วนสูง']) { sumHeight += parseFloat(st['ส่วนสูง']); countHeight++; }
                // Levels
                const lv = st['ชั้น'] || 'ไม่ระบุ';
                levels[lv] = (levels[lv] || 0) + 1;
                // Religion
                const rel = st['ศาสนา'] || 'ไม่ระบุ';
                religions[rel] = (religions[rel] || 0) + 1;
            });

            // Update Stats
            document.getElementById('stat-total').innerText = total.toLocaleString();
            document.getElementById('stat-gender').innerText = `${male} / ${female}`;
            document.getElementById('stat-disadvantaged').innerText = disadvantaged;
            document.getElementById('stat-height').innerText = countHeight > 0 ? (sumHeight/countHeight).toFixed(1) : '-';

            renderCharts(levels, religions);
        }

        function renderCharts(levelData, religionData) {
            if (levelChartInstance) levelChartInstance.destroy();
            if (religionChartInstance) religionChartInstance.destroy();

            // Bar Chart - Levels
            const ctxLevel = document.getElementById('levelChart').getContext('2d');
            levelChartInstance = new Chart(ctxLevel, {
                type: 'bar',
                data: {
                    labels: Object.keys(levelData),
                    datasets: [{
                        label: 'จำนวนนักเรียน',
                        data: Object.values(levelData),
                        backgroundColor: '#0ea5e9',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Pie Chart - Religion
            const ctxRel = document.getElementById('religionChart').getContext('2d');
            religionChartInstance = new Chart(ctxRel, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(religionData),
                    datasets: [{
                        data: Object.values(religionData),
                        backgroundColor: ['#0284c7', '#f43f5e', '#10b981', '#f59e0b']
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });
        }

        function searchData() {
            const input = document.getElementById("searchInput").value.trim();
            const display = document.getElementById("displayData");
            const resultsArea = document.getElementById("resultsArea");
            const loading = document.getElementById("loading");

            if (!input) return;
            resultsArea.classList.remove('hidden');
            loading.classList.remove('hidden');
            display.innerHTML = "";
            
            fetch(`${scriptURL}?searchValue=${encodeURIComponent(input)}`)
                .then(r => r.json())
                .then(res => {
                    loading.classList.add('hidden');
                    if (res.count === 0) {
                        display.innerHTML = `<div class="text-center py-10 text-slate-400">ไม่พบข้อมูล</div>`;
                        return;
                    }
                    res.data.forEach(st => {
                        display.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-sky-50 text-sky-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-user"></i></div>
                                    <div>
                                        <div class="font-bold text-slate-800">${st['ชื่อ']} ${st['นามสกุล']}</div>
                                        <div class="text-xs text-slate-500">ชั้น ${st['ชั้น']}/${st['ห้อง']} | ${st['ศาสนา']}</div>
                                    </div>
                                </div>
                                <div class="text-right text-xs text-slate-400">ID: ${st['เลขประจำตัวประชาชน'].substring(0,5)}...</div>
                            </div>
                        `;
                    });
                })
                .catch(() => loading.classList.add('hidden'));
        }
    </script>
</body>
</html>
