<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMC SNR - ค้นหาข้อมูล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-collapsed { width: 80px; }
        .sidebar-expanded { width: 260px; }
        .menu-text { transition: opacity 0.2s; }
        .collapsed .menu-text { opacity: 0; display: none; }
        .active-menu { background-color: #f0f9ff; color: #0284c7; border-radius: 0.75rem; }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="h-16 flex items-center px-6 border-b border-slate-100 shrink-0">
            <i class="fa-solid fa-graduation-cap text-2xl text-sky-600 mr-4"></i>
            <span class="menu-text font-bold text-xl text-slate-800 whitespace-nowrap">DMC SNR</span>
        </div>

        <nav class="flex-1 py-6 px-3 space-y-2">
            <a href="index.html" class="flex items-center px-4 py-3 active-menu font-medium transition-all group">
                <i class="fa-solid fa-magnifying-glass w-6 text-lg"></i>
                <span class="menu-text ml-3">ค้นหาข้อมูล</span>
            </a>
            <a href="admin.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-sky-600 rounded-xl transition-all group">
                <i class="fa-solid fa-lock w-6 text-lg"></i>
                <span class="menu-text ml-3">ส่วนแอดมิน</span>
            </a>
        </nav>

        <div class="p-3 border-t border-slate-100">
            <button onclick="toggleSidebar()" class="w-full flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                <i id="toggle-icon" class="fa-solid fa-angles-left w-6 text-lg"></i>
                <span class="menu-text ml-3">ซ่อนเมนู</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="h-16 flex items-center px-6 bg-white border-b border-slate-200 md:hidden">
            <button onclick="toggleSidebar()" class="text-slate-500 text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="ml-4 font-bold text-slate-800">DMC SNR</span>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-4xl mx-auto space-y-8">
                <!-- Header Section -->
                <div class="text-center py-6">
                    <h1 class="text-3xl font-bold text-slate-800 mb-2">ระบบค้นหาข้อมูลนักเรียน</h1>
                    <p class="text-slate-500">กรุณากรอกชื่อ นามสกุล หรือเลขประจำตัวประชาชนเพื่อค้นหา</p>
                    
                    <!-- แสดงสถานะการแก้ไขปัจจุบัน -->
                    <div id="permissionStatus" class="mt-4 inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold">
                        <!-- จะถูกเติมด้วย JavaScript -->
                    </div>
                </div>

                <!-- Search Box -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-sky-500 transition-colors">
                        <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    </div>
                    <input type="text" id="searchInput" 
                           onkeyup="if(event.key === 'Enter') searchData()" 
                           placeholder="พิมพ์ชื่อหรือนามสกุล..." 
                           class="w-full bg-white border border-slate-200 rounded-3xl pl-14 pr-36 py-6 outline-none focus:ring-4 ring-sky-500/10 focus:border-sky-500 transition-all text-xl shadow-sm">
                    <button onclick="searchData()" 
                            class="absolute right-4 top-4 bottom-4 bg-sky-600 text-white px-8 rounded-2xl font-bold hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-sky-600/20">
                        ค้นหา
                    </button>
                </div>

                <!-- Status Banner (แจ้งเตือนหากปิดการแก้ไข) -->
                <div id="editDisabledBanner" class="hidden bg-amber-50 border border-amber-200 p-5 rounded-3xl flex items-start gap-4 text-amber-800">
                    <div class="mt-1"><i class="fa-solid fa-triangle-exclamation text-xl"></i></div>
                    <div>
                        <p class="font-bold text-lg">โหมดอ่านอย่างเดียว</p>
                        <p class="text-sm opacity-80">แอดมินปิดการแก้ไขข้อมูลในขณะนี้ คุณสามารถค้นหาและดูข้อมูลได้ แต่ไม่สามารถเปลี่ยนแปลงข้อมูลได้</p>
                    </div>
                </div>

                <!-- Results Display Area -->
                <div id="resultsArea" class="hidden space-y-4">
                    <div id="loading" class="hidden flex flex-col items-center py-12">
                        <div class="spinner mb-4"></div>
                        <p class="text-slate-400">กำลังค้นหาข้อมูล...</p>
                    </div>
                    <div id="displayData" class="grid grid-cols-1 gap-4 pb-12"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-user-pen mr-2 text-sky-600"></i>แก้ไขข้อมูลนักเรียน</h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="editForm" class="p-8 space-y-6">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">ชื่อ</label>
                        <input type="text" id="edit-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">นามสกุล</label>
                        <input type="text" id="edit-surname" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="saveData()" class="flex-[2] bg-sky-600 text-white py-4 rounded-2xl font-bold hover:bg-sky-700 shadow-lg shadow-sky-600/20 active:scale-95 transition-all">บันทึกข้อมูล</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec';

        // ตรวจสอบสถานะและอัปเดต UI ทันทีที่โหลดหน้า
        window.onload = updateUIPermission;

        function checkEditPermission() {
            return localStorage.getItem('allowUserEdit') === 'true';
        }

        function updateUIPermission() {
            const statusDiv = document.getElementById('permissionStatus');
            const canEdit = checkEditPermission();
            
            if (canEdit) {
                statusDiv.innerHTML = '<i class="fa-solid fa-lock-open mr-2"></i> ระบบเปิดให้แก้ไขข้อมูลได้';
                statusDiv.className = 'mt-4 inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold bg-emerald-50 text-emerald-600 border border-emerald-100';
            } else {
                statusDiv.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> ระบบปิดการแก้ไข (อ่านอย่างเดียว)';
                statusDiv.className = 'mt-4 inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold bg-amber-50 text-amber-600 border border-amber-100';
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('sidebar-expanded');
            sidebar.classList.toggle('sidebar-collapsed');
            sidebar.classList.toggle('collapsed');
            icon.classList.toggle('fa-angles-left');
            icon.classList.toggle('fa-angles-right');
        }

        function searchData() {
            const input = document.getElementById("searchInput").value.trim();
            const display = document.getElementById("displayData");
            const resultsArea = document.getElementById("resultsArea");
            const loading = document.getElementById("loading");
            const banner = document.getElementById("editDisabledBanner");

            if (!input) return;

            resultsArea.classList.remove('hidden');
            loading.classList.remove('hidden');
            display.innerHTML = "";
            
            const canEdit = checkEditPermission();
            banner.classList.toggle('hidden', canEdit);

            fetch(`${scriptURL}?searchValue=${encodeURIComponent(input)}`)
                .then(r => r.json())
                .then(res => {
                    loading.classList.add('hidden');
                    if (res.count === 0) {
                        display.innerHTML = `<div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400">ไม่พบข้อมูลนักเรียน</div>`;
                        return;
                    }

                    res.data.forEach(st => {
                        const editBtn = canEdit 
                            ? `<button onclick="openEdit('${st['เลขประจำตัวประชาชน']}', '${st['ชื่อ']}', '${st['นามสกุล']}')" 
                                       class="px-5 py-2.5 bg-sky-600 text-white rounded-xl text-sm font-bold hover:bg-sky-700 transition-all shadow-md shadow-sky-600/10">
                                   <i class="fa-solid fa-pen-to-square mr-2"></i>แก้ไข
                               </button>`
                            : `<span class="bg-slate-100 text-slate-400 px-4 py-2 rounded-xl text-xs font-medium uppercase tracking-wider">Read Only</span>`;

                        display.innerHTML += `
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between hover:shadow-md hover:border-sky-100 transition-all group">
                                <div class="flex items-center gap-5">
                                    <div class="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-sky-50 group-hover:text-sky-500 transition-colors">
                                        <i class="fa-solid fa-user-graduate text-3xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-slate-800 text-xl">${st['ชื่อ']} ${st['นามสกุล']}</h3>
                                        <div class="flex flex-wrap gap-4 text-sm text-slate-500 mt-1">
                                            <span class="flex items-center"><i class="fa-solid fa-school-flag mr-2 text-slate-300"></i>ชั้น ${st['ชั้น']}/${st['ห้อง']}</span>
                                            <span class="flex items-center"><i class="fa-solid fa-id-card-clip mr-2 text-slate-300"></i>${st['รหัสประจำตัวนักเรียน']}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex flex-col items-end gap-2">
                                    ${editBtn}
                                </div>
                            </div>
                        `;
                    });
                })
                .catch(() => {
                    loading.classList.add('hidden');
                    alert("การเชื่อมต่อมีปัญหา กรุณาลองใหม่อีกครั้ง");
                });
        }

        function openEdit(id, name, surname) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-surname').value = surname;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function saveData() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            const surname = document.getElementById('edit-surname').value;
            
            // ตัวอย่างจำลองการบันทึก
            alert(`กำลังบันทึกข้อมูลของ ${name} ${surname} (ฟีเจอร์นี้ต้องเชื่อมต่อกับ Google Apps Script)`);
            closeEditModal();
            searchData();
        }
    </script>
</body>
</html>
