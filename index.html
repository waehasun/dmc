<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาข้อมูลนักเรียน DMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-title">🏫 ระบบข้อมูลนักเรียน (DMC)</div>
        <button class="btn-manage" onclick="goToManagePage()">⚙️ จัดการข้อมูล</button>
    </nav>

    <div class="search-container">
        <h2>🔍 ค้นหาข้อมูลนักเรียน</h2>
        <div class="search-box">
            <select id="searchType">
                <option value="เลขประจำตัวประชาชน">เลขประจำตัวประชาชน</option>
                <option value="รหัสประจำตัวนักเรียน">เลขประจำตัวนักเรียน</option>
                <option value="ชื่อ">ชื่อ</option>
                <option value="นามสกุล">นามสกุล</option>
            </select>
            
            <input type="text" id="searchInput" placeholder="พิมพ์ข้อมูลที่ต้องการค้นหา...">
            
            <button class="btn-search" onclick="searchData()">ค้นหา</button>
        </div>
    </div>

    <div class="results-area" id="resultsArea">
        <p id="loadingText" style="text-align: center; color: #7f8c8d;">กำลังค้นหาข้อมูล...</p>
        <div id="displayData"></div>
    </div>

    <script>
        // 🚨 เอา URL Web App อันใหม่ของคุณมาใส่ตรงนี้ 🚨
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec';

        // ฟังก์ชันเมื่อกดปุ่มค้นหา
        function searchData() {
            const searchType = document.getElementById("searchType").value;
            const searchInput = document.getElementById("searchInput").value;
            const resultsArea = document.getElementById("resultsArea");
            const loadingText = document.getElementById("loadingText");
            const displayData = document.getElementById("displayData");

            if (searchInput.trim() === "") {
                alert("กรุณากรอกข้อมูลที่ต้องการค้นหา");
                return;
            }

            // แสดงสถานะกำลังโหลด
            resultsArea.style.display = "block";
            displayData.innerHTML = "";
            loadingText.style.display = "block";
            loadingText.innerHTML = `กำลังค้นหา "${searchInput}" จาก ${searchType}... ⏳`;

            // สร้าง URL สำหรับดึงข้อมูล (GET Request)
            const fetchUrl = `${scriptURL}?searchType=${encodeURIComponent(searchType)}&searchValue=${encodeURIComponent(searchInput)}`;

            // ส่งคำขอไปยัง Google Apps Script
            fetch(fetchUrl)
                .then(response => response.json())
                .then(result => {
                    loadingText.style.display = "none";

                    if (result.status === "error") {
                        displayData.innerHTML = `<p style="color:red; text-align:center;">❌ เกิดข้อผิดพลาด: ${result.message}</p>`;
                        return;
                    }

                    if (result.count === 0) {
                        displayData.innerHTML = `<p style="color:#e67e22; text-align:center;">⚠️ ไม่พบข้อมูลนักเรียนที่ค้นหา</p>`;
                        return;
                    }

                    // แสดงผลข้อมูลที่หาเจอ (สร้างเป็นการ์ดสวยๆ)
                    let htmlOutput = `<p style="color:green; margin-bottom: 15px;">✅ พบข้อมูลทั้งหมด ${result.count} รายการ</p>`;
                    
                    result.data.forEach(student => {
                        htmlOutput += `
                            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fdfdfd; text-align: left;">
                                <h3 style="color: #2c3e50; margin-bottom: 10px;">
                                    ${student['คำนำหน้าชื่อ'] || ''}${student['ชื่อ'] || ''} ${student['นามสกุล'] || ''}
                                </h3>
                                <p><strong>รหัสประจำตัวนักเรียน:</strong> ${student['รหัสประจำตัวนักเรียน'] || '-'}</p>
                                <p><strong>เลขประจำตัวประชาชน:</strong> ${student['เลขประจำตัวประชาชน'] || '-'}</p>
                                <p><strong>ระดับชั้น:</strong> ${student['ชั้น'] || '-'} / ${student['ห้อง'] || '-'}</p>
                                <p><strong>ชื่อผู้ปกครอง:</strong> ${student['ชื่อผู้ปกครอง'] || '-'} ${student['นามสกุลผู้ปกครอง'] || '-'}</p>
                            </div>
                        `;
                    });

                    displayData.innerHTML = htmlOutput;
                })
                .catch(error => {
                    loadingText.style.display = "none";
                    displayData.innerHTML = `<p style="color:red; text-align:center;">❌ ติดต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่</p>`;
                    console.error('Error fetching data:', error);
                });
        }

        // ฟังก์ชันไปหน้าจัดการข้อมูล
        function goToManagePage() {
            alert("เดี๋ยวจะพาไปหน้าจัดการข้อมูล (รอกำหนดรายละเอียดครับ)");
        }
    </script>

</body>
</html>
