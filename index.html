<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบฟอร์มบันทึกข้อมูล DMC</title>
</head>
<body>

    <h2>กรอกข้อมูลของคุณ</h2>
    
    <form id="myForm">
        <label>ชื่อ:</label>
        <input type="text" name="ชื่อ" required><br><br>
        
        <label>นามสกุล:</label>
        <input type="text" name="นามสกุล" required><br><br>
        
        <label>เบอร์โทรศัพท์:</label>
        <input type="text" name="เบอร์โทรศัพท์"><br><br>
        
        <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
    </form>

    <p id="message"></p>

    <script>
        // เอา URL ที่ได้จากขั้นตอนที่ 3 มาใส่ตรงนี้
        const scriptURL = 'https://script.google.com/a/macros/kbyala.ac.th/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec'; 
        const form = document.getElementById('myForm');
        const btn = document.getElementById('submitBtn');
        const message = document.getElementById('message');

        form.addEventListener('submit', e => {
            e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรช
            btn.disabled = true;
            btn.innerHTML = 'กำลังบันทึก...';

            // ส่งข้อมูลผ่าน Fetch API ไปยัง Google Apps Script
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    message.innerHTML = "บันทึกข้อมูลสำเร็จแล้ว!";
                    message.style.color = "green";
                    form.reset(); // ล้างข้อมูลในฟอร์ม
                    btn.disabled = false;
                    btn.innerHTML = 'บันทึกข้อมูล';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    message.innerHTML = "เกิดข้อผิดพลาดในการบันทึก";
                    message.style.color = "red";
                    btn.disabled = false;
                    btn.innerHTML = 'บันทึกข้อมูล';
                });
        });
    </script>
</body>
</html>
