<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMC SNR - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .active-menu { background-color: #f0f9ff; color: #0284c7; border-radius: 0.75rem; }
        .card-stat { transition: transform 0.2s; }
        .card-stat:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <i class="fa-solid fa-graduation-cap text-2xl text-sky-600 mr-3"></i>
            <span class="font-bold text-xl text-slate-800">DMC SNR</span>
        </div>
        <nav class="flex-1 py-6 px-3 space-y-2">
            <a href="index.html" class="flex items-center px-4 py-3 active-menu font-medium text-sky-600">
                <i class="fa-solid fa-chart-line w-6"></i><span class="ml-3">Dashboard</span>
            </a>
            <a href="teacher.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                <i class="fa-solid fa-chalkboard-user w-6"></i><span class="ml-3">สำหรับครูที่ปรึกษา</span>
            </a>
            <a href="student.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                <i class="fa-solid fa-user-pen w-6"></i><span class="ml-3">สำหรับนักเรียน</span>
            </a>
            <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-400 uppercase">ระบบจัดการ</div>
            <a href="admin.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                <i class="fa-solid fa-lock w-6"></i><span class="ml-3">Admin Panel</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-y-auto">
        <main class="p-6 md:p-10 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">ระบบบริหารจัดการข้อมูลนักเรียน</h1>
                    <p class="text-slate-500">ภาพรวมสถิตินักเรียนโรงเรียนคณะราษฎรบำรุง จังหวัดยะลา</p>
                </div>
                <button onclick="location.reload()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold text-slate-600 shadow-sm hover:bg-slate-50">
                    <i class="fa-solid fa-arrows-rotate mr-2"></i>รีเฟรชข้อมูล
                </button>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <div class="card-stat bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">นักเรียนทั้งหมด</p>
                    <h3 class="text-3xl font-bold text-slate-800" id="stat-total">0</h3>
                </div>
                <div class="card-stat bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">ชาย / หญิง</p>
                    <h3 class="text-3xl font-bold text-slate-800" id="stat-gender">0 / 0</h3>
                </div>
                <div class="card-stat bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">นักเรียนยากจน</p>
                    <h3 class="text-3xl font-bold text-rose-500" id="stat-disadvantaged">0</h3>
                </div>
                <div class="card-stat bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">เฉลี่ยส่วนสูง</p>
                    <h3 class="text-3xl font-bold text-sky-600" id="stat-height">0</h3>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                    <h4 class="font-bold text-slate-700 mb-6">สถิติแยกตามระดับชั้น</h4>
                    <div class="h-64"><canvas id="levelChart"></canvas></div>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <h4 class="font-bold text-slate-700 mb-6">สัดส่วนผู้นับถือศาสนา</h4>
                    <div class="h-64 flex justify-center"><canvas id="religionChart"></canvas></div>
                </div>
            </div>

            <!-- Search Area -->
            <div class="max-w-2xl mx-auto space-y-6">
                <h3 class="text-xl font-bold text-slate-800 text-center">ค้นหารายบุคคล</h3>
                <div class="relative group">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') searchData()" 
                           placeholder="พิมพ์ชื่อ นามสกุล หรือเลขบัตรประชาชน..." 
                           class="w-full bg-white border border-slate-200 rounded-full pl-14 pr-32 py-5 outline-none focus:ring-4 ring-sky-500/10 focus:border-sky-500 transition-all shadow-sm">
                    <button onclick="searchData()" class="absolute right-3 top-3 bottom-3 bg-sky-600 text-white px-8 rounded-full font-bold hover:bg-sky-700 transition-all">ค้นหา</button>
                </div>
                <div id="resultsArea" class="hidden">
                    <div id="displayData" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec';
        let allStudents = [];
        let levelChartInstance, religionChartInstance;

        window.onload = async () => {
            try {
                const response = await fetch(`${scriptURL}?action=getAll`);
                const res = await response.json();
                allStudents = res.data || [];
                updateUI();
            } catch (e) { console.error(e); }
        };

        function updateUI() {
            const total = allStudents.length;
            const male = allStudents.filter(d => d['เพศ'] === 'ช' || d['คำนำหน้าชื่อ']?.includes('เด็กชาย')).length;
            const disadvantaged = allStudents.filter(d => d['ความด้อยโอกาส'] && d['ความด้อยโอกาส'] !== '-' && d['ความด้อยโอกาส'] !== '').length;
            
            let sumH = 0, countH = 0;
            const levels = {};
            const religions = {};

            allStudents.forEach(st => {
                if(st['ส่วนสูง']) { sumH += parseFloat(st['ส่วนสูง']); countH++; }
                levels[st['ชั้น']] = (levels[st['ชั้น']] || 0) + 1;
                religions[st['ศาสนา']] = (religions[st['ศาสนา']] || 0) + 1;
            });

            document.getElementById('stat-total').innerText = total.toLocaleString();
            document.getElementById('stat-gender').innerText = `${male} / ${total - male}`;
            document.getElementById('stat-disadvantaged').innerText = disadvantaged;
            document.getElementById('stat-height').innerText = countH > 0 ? (sumH/countH).toFixed(1) + ' ซม.' : '-';

            renderCharts(levels, religions);
        }

        function renderCharts(levelData, religionData) {
            const ctxL = document.getElementById('levelChart').getContext('2d');
            levelChartInstance = new Chart(ctxL, {
                type: 'bar',
                data: { labels: Object.keys(levelData), datasets: [{ label: 'คน', data: Object.values(levelData), backgroundColor: '#0ea5e9', borderRadius: 10 }] },
                options: { maintainAspectRatio: false }
            });

            const ctxR = document.getElementById('religionChart').getContext('2d');
            religionChartInstance = new Chart(ctxR, {
                type: 'doughnut',
                data: { labels: Object.keys(religionData), datasets: [{ data: Object.values(religionData), backgroundColor: ['#0284c7', '#f43f5e', '#10b981', '#f59e0b'] }] },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });
        }

        function searchData() {
            const input = document.getElementById("searchInput").value.trim();
            const display = document.getElementById("displayData");
            if (!input) return;
            document.getElementById("resultsArea").classList.remove('hidden');
            
            const filtered = allStudents.filter(s => 
                s['ชื่อ'].includes(input) || s['นามสกุล'].includes(input) || s['เลขประจำตัวประชาชน'].includes(input)
            );
            
            display.innerHTML = filtered.length === 0 ? '<p class="text-center text-slate-400">ไม่พบข้อมูล</p>' : '';
            filtered.forEach(st => {
                display.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm">
                        <div>
                            <div class="font-bold text-slate-800 text-lg">${st['ชื่อ']} ${st['นามสกุล']}</div>
                            <div class="text-sm text-slate-500">ม.${st['ชั้น']}/${st['ห้อง']} • ID: ${st['เลขประจำตัวประชาชน']}</div>
                        </div>
                        <div class="text-sky-600"><i class="fa-solid fa-circle-info text-xl"></i></div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
