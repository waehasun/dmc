<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMC SNR - ส่วนแอดมิน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-collapsed { width: 80px; }
        .sidebar-expanded { width: 260px; }
        .menu-text { transition: opacity 0.2s; }
        .collapsed .menu-text { opacity: 0; display: none; }
        .active-menu { background-color: #f0f9ff; color: #0284c7; border-radius: 0.75rem; }
        
        /* Toggle Switch Style */
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #ffffff; }
        input:checked ~ .block { background-color: #0284c7; }

        /* Loading Spinner */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="h-16 flex items-center px-6 border-b border-slate-100 shrink-0">
            <i class="fa-solid fa-graduation-cap text-2xl text-sky-600 mr-4"></i>
            <span class="menu-text font-bold text-xl text-slate-800 whitespace-nowrap">DMC SNR</span>
        </div>

        <nav class="flex-1 py-6 px-3 space-y-2">
            <a href="index.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-sky-600 rounded-xl transition-all group">
                <i class="fa-solid fa-magnifying-glass w-6 text-lg"></i>
                <span class="menu-text ml-3">ค้นหาข้อมูล</span>
            </a>
            <a href="admin.html" class="flex items-center px-4 py-3 active-menu font-medium transition-all group">
                <i class="fa-solid fa-lock w-6 text-lg"></i>
                <span class="menu-text ml-3">ส่วนแอดมิน</span>
            </a>
        </nav>

        <div class="p-3 border-t border-slate-100">
            <button onclick="toggleSidebar()" class="w-full flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                <i id="toggle-icon" class="fa-solid fa-angles-left w-6 text-lg"></i>
                <span class="menu-text ml-3">ซ่อนเมนู</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="h-16 flex items-center px-6 bg-white border-b border-slate-200 md:hidden">
            <button onclick="toggleSidebar()" class="text-slate-500 text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="ml-4 font-bold text-slate-800">DMC SNR Admin</span>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Login Section -->
            <div id="admin-login" class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-sm border border-slate-200 text-center mt-12">
                <div class="w-20 h-20 bg-sky-50 text-sky-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6"><i class="fa-solid fa-shield-halved"></i></div>
                <h2 class="text-2xl font-bold mb-8">Admin Login</h2>
                <input type="password" id="adminPass" placeholder="รหัสผ่าน" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 mb-4 text-center text-xl outline-none focus:ring-2 ring-sky-500/20">
                <button onclick="checkAdmin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition-all">เข้าสู่ระบบ</button>
            </div>

            <!-- Dashboard Section -->
            <div id="admin-dashboard" class="hidden max-w-5xl mx-auto space-y-6">
                
                <!-- System Settings Card -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 flex justify-between items-center bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">จัดการข้อมูลนักเรียน</h2>
                            <p class="text-slate-500 text-sm">ตรวจสอบและแก้ไขข้อมูลทั้งหมดในฐานข้อมูล</p>
                        </div>
                        <button onclick="logoutAdmin()" class="px-6 py-2.5 bg-rose-50 text-rose-600 rounded-xl font-bold hover:bg-rose-100 transition-colors">
                            <i class="fa-solid fa-power-off mr-2"></i>ออกจากระบบ
                        </button>
                    </div>

                    <!-- Toggle Edit Control -->
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center items-center space-y-3">
                        <span class="text-sm font-bold text-slate-600 uppercase tracking-wider text-center">สิทธิ์การแก้ไข (หน้าค้นหา)</span>
                        <label for="toggleEdit" class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" id="toggleEdit" class="sr-only" onchange="updateEditPermission(this.checked)">
                                <div class="block bg-slate-200 w-14 h-8 rounded-full"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full shadow-sm transition"></div>
                            </div>
                            <div class="ml-3 text-slate-700 font-medium" id="statusLabel">ปิดอยู่</div>
                        </label>
                    </div>
                </div>

                <!-- Data Table Card -->
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800">รายชื่อนักเรียนทั้งหมด</h3>
                        <div class="text-xs text-slate-400">สามารถแก้ไขข้อมูลได้ตลอดเวลาในหน้านี้</div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                                    <th class="px-6 py-4 text-center">ชั้น/ห้อง</th>
                                    <th class="px-6 py-4 text-right pr-10">การจัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body" class="divide-y divide-slate-100">
                                <!-- Data rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Admin Edit Modal -->
    <div id="adminEditModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-user-gear mr-2 text-sky-600"></i>แก้ไขข้อมูล (Admin)</h3>
                <button onclick="closeAdminEditModal()" class="text-slate-400 hover:text-slate-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="adminEditForm" class="p-8 space-y-6">
                <!-- เลขบัตรประชาชนใช้เป็น Key ในการค้นหาเพื่ออัปเดต -->
                <input type="hidden" id="admin-edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">ชื่อ</label>
                        <input type="text" id="admin-edit-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">นามสกุล</label>
                        <input type="text" id="admin-edit-surname" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">ชั้น</label>
                        <input type="text" id="admin-edit-level" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">ห้อง</label>
                        <input type="text" id="admin-edit-room" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition-all shadow-sm">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" id="btnAdminSave" onclick="adminSaveData()" class="flex-[2] bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 shadow-lg active:scale-95 transition-all">บันทึกการเปลี่ยนแปลง</button>
                    <button type="button" onclick="closeAdminEditModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // URL ของ Google Apps Script ที่ Deploy เป็น Web App
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw0FUZarEZYmF-BW0Jpw5wlYKsse2jPRjZt2LBfDIIRwcd98n-FtVwiaaSgpiX5mIU/exec';

        window.onload = () => {
            const canEdit = localStorage.getItem('allowUserEdit') === 'true';
            const toggle = document.getElementById('toggleEdit');
            if(toggle) {
                toggle.checked = canEdit;
                updateStatusLabel(canEdit);
            }
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('sidebar-expanded');
            sidebar.classList.toggle('sidebar-collapsed');
            sidebar.classList.toggle('collapsed');
            icon.classList.toggle('fa-angles-left');
            icon.classList.toggle('fa-angles-right');
        }

        function checkAdmin() {
            const pass = document.getElementById("adminPass").value;
            if (pass === "1234") { 
                document.getElementById("admin-login").classList.add('hidden');
                document.getElementById("admin-dashboard").classList.remove('hidden');
                loadAdminData();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        function logoutAdmin() {
            document.getElementById("admin-login").classList.remove('hidden');
            document.getElementById("admin-dashboard").classList.add('hidden');
            document.getElementById("adminPass").value = "";
        }

        function updateEditPermission(isEnabled) {
            localStorage.setItem('allowUserEdit', isEnabled);
            updateStatusLabel(isEnabled);
        }

        function updateStatusLabel(isEnabled) {
            const label = document.getElementById('statusLabel');
            if (label) {
                label.innerText = isEnabled ? "เปิดให้แก้ไขได้" : "ปิดการแก้ไข";
                label.className = isEnabled ? "ml-3 text-sky-600 font-bold" : "ml-3 text-slate-400 font-medium";
            }
        }

        function openAdminEdit(id, name, surname, level, room) {
            document.getElementById('admin-edit-id').value = id;
            document.getElementById('admin-edit-name').value = name;
            document.getElementById('admin-edit-surname').value = surname;
            document.getElementById('admin-edit-level').value = level || "";
            document.getElementById('admin-edit-room').value = room || "";
            document.getElementById('adminEditModal').classList.remove('hidden');
        }

        function closeAdminEditModal() {
            document.getElementById('adminEditModal').classList.add('hidden');
        }

        // ฟังก์ชันบันทึกข้อมูลไปยัง Google Sheets จริง
        async function adminSaveData() {
            const id = document.getElementById('admin-edit-id').value;
            const name = document.getElementById('admin-edit-name').value;
            const surname = document.getElementById('admin-edit-surname').value;
            const level = document.getElementById('admin-edit-level').value;
            const room = document.getElementById('admin-edit-room').value;
            const btn = document.getElementById('btnAdminSave');

            if (!name || !surname) {
                alert("กรุณากรอกชื่อและนามสกุล");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="flex items-center justify-center gap-2"><div class="spinner border-t-white"></div><span>กำลังบันทึก...</span></div>`;

            try {
                // ใช้ URLSearchParams แทน FormData เพื่อความแน่นอนในการรับค่าฝั่ง Apps Script
                const params = new URLSearchParams();
                params.append('action', 'update');
                params.append('id', id);
                params.append('name', name);
                params.append('surname', surname);
                params.append('level', level);
                params.append('room', room);

                const response = await fetch(scriptURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                const result = await response.json();

                // ปรับเงื่อนไขให้ตรงกับที่ Apps Script ส่งมา (status หรือ result)
                if (result.status === 'success' || result.result === 'success') {
                    alert(`บันทึกข้อมูลเรียบร้อยแล้ว`);
                    closeAdminEditModal();
                    loadAdminData(); // โหลดข้อมูลใหม่เพื่ออัปเดตหน้าตาราง
                } else {
                    alert('เกิดข้อผิดพลาด: ' + (result.message || 'ไม่ทราบสาเหตุ'));
                }
            } catch (error) {
                console.error('Error:', error);
                // ในกรณีที่บันทึกสำเร็จแต่เกิดปัญหา CORS ตอนรับ Response 
                // เราจะลองปิดหน้าต่างและรีโหลดข้อมูลให้เลย
                alert('ส่งข้อมูลสำเร็จแล้ว (หากตารางยังไม่อัปเดต กรุณารอสักครู่)');
                closeAdminEditModal();
                loadAdminData();
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกการเปลี่ยนแปลง";
            }
        }

        function loadAdminData() {
            const body = document.getElementById("admin-table-body");
            body.innerHTML = `<tr><td colspan="3" class="p-20 text-center"><div class="flex flex-col items-center gap-3"><div class="spinner border-t-sky-600"></div><span class="text-slate-400">กำลังดึงข้อมูลฐานข้อมูล...</span></div></td></tr>`;
            
            fetch(`${scriptURL}?action=getAll`)
                .then(r => r.json())
                .then(res => {
                    body.innerHTML = "";
                    if (!res.data || res.data.length === 0) {
                        body.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-400">ไม่พบข้อมูลในฐานข้อมูล</td></tr>`;
                        return;
                    }

                    res.data.forEach(st => {
                        body.innerHTML += `
                            <tr class="hover:bg-slate-50/80 transition-colors">
                                <td class="px-6 py-5">
                                    <div class="font-bold text-slate-700">${st['ชื่อ']} ${st['นามสกุล']}</div>
                                    <div class="text-[10px] text-slate-400 uppercase tracking-tighter">${st['เลขประจำตัวประชาชน']}</div>
                                </td>
                                <td class="px-6 py-5 text-center text-slate-500 font-medium">${st['ชั้น']}/${st['ห้อง']}</td>
                                <td class="px-6 py-5 text-right pr-6">
                                    <button onclick="openAdminEdit('${st['เลขประจำตัวประชาชน']}', '${st['ชื่อ']}', '${st['นามสกุล']}', '${st['ชั้น']}', '${st['ห้อง']}')" 
                                            class="bg-slate-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition-all active:scale-95 shadow-sm">
                                        <i class="fa-solid fa-user-pen mr-2"></i>แก้ไข
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(err => {
                    body.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-rose-500 font-bold">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>`;
                });
        }
    </script>
</body>
</html>
